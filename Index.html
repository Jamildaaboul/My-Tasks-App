<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90e2">
  
  <!-- Inline Manifest for Phone "Install as App" Feature -->
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22My%20Tasks%20%26%20Notes%22,%22short_name%22:%22TasksNotes%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%234a90e2%22}">
  
  <title>My Tasks & Notes</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #f4f4f4; padding-bottom: 60px; }
    header { background: #4a90e2; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; }
    .tab-content { display: none; padding: 20px; }
    .active { display: block; }
    nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #333; }
    nav button { flex: 1; padding: 15px; background: none; color: white; border: none; cursor: pointer; font-size: 14px; }
    nav button.active { background: #4a90e2; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, textarea, button { width: 100%; margin: 5px 0; padding: 10px; box-sizing: border-box; font-size: 16px; }
    button { background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .btn-edit { background: #f0ad4e; }
    .btn-delete { background: #d9534f; }
    .btn-cancel { background: #888; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
  </style>
</head>
<body>

<header><h2>My Tasks & Notes</h2></header>

<!-- Dashboard Tab -->
<section id="dashboard" class="tab-content active">
  <h3>Dashboard</h3>
  <div id="dash-stats"></div>
</section>

<!-- Tasks Tab (With Editing) -->
<section id="tasks" class="tab-content">
  <h3>Tasks</h3>
  <input type="text" id="task-title" placeholder="Task name">
  <input type="date" id="task-date">
  <input type="time" id="task-time">
  <button id="task-submit-btn" onclick="saveTask()">Add Task</button>
  <button id="task-cancel-btn" onclick="cancelEdit()" class="btn-cancel" style="display:none;">Cancel Edit</button>
  <hr>
  <div id="task-list"></div>
</section>

<!-- Notes Tab -->
<section id="notes" class="tab-content">
  <h3>Notes</h3>
  <input type="text" id="note-title" placeholder="Note title">
  <textarea id="note-body" placeholder="Write your note..."></textarea>
  <button onclick="addNote()">Save Note</button>
  <hr>
  <div id="note-list"></div>
</section>

<nav>
  <button onclick="showTab('dashboard', this)" class="active">Dashboard</button>
  <button onclick="showTab('tasks', this)">Tasks</button>
  <button onclick="showTab('notes', this)">Notes</button>
</nav>

<script>
// Tab Navigation
function showTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if(btn) btn.classList.add('active');
  updateDashboard();
}

// --- TASKS (With Editing) ---
let editingTaskId = null;

function saveTask() {
  const title = document.getElementById('task-title').value;
  const date = document.getElementById('task-date').value;
  const time = document.getElementById('task-time').value;
  if (!title) return alert('Task name needed');
  
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  
  if (editingTaskId) {
    tasks = tasks.map(t => t.id === editingTaskId ? { ...t, title, date, time } : t);
  } else {
    tasks.push({ id: Date.now(), title, date, time, done: false });
  }
  
  localStorage.setItem('tasks', JSON.stringify(tasks));
  cancelEdit();
  renderTasks();
  updateDashboard();
}

function editTask(id) {
  const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  
  document.getElementById('task-title').value = task.title;
  document.getElementById('task-date').value = task.date;
  document.getElementById('task-time').value = task.time;
  
  editingTaskId = id;
  document.getElementById('task-submit-btn').textContent = 'Update Task';
  document.getElementById('task-cancel-btn').style.display = 'block';
  window.scrollTo(0, 0);
}

function cancelEdit() {
  editingTaskId = null;
  document.getElementById('task-title').value = '';
  document.getElementById('task-date').value = '';
  document.getElementById('task-time').value = '';
  document.getElementById('task-submit-btn').textContent = 'Add Task';
  document.getElementById('task-cancel-btn').style.display = 'none';
}

function deleteTask(id) {
  if(!confirm('Delete this task?')) return;
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  tasks = tasks.filter(t => t.id !== id);
  localStorage.setItem('tasks', JSON.stringify(tasks));
  if (editingTaskId === id) cancelEdit();
  renderTasks();
  updateDashboard();
}

function renderTasks() {
  const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  if(tasks.length === 0) {
    document.getElementById('task-list').innerHTML = '<p>No tasks yet.</p>';
    return;
  }
  document.getElementById('task-list').innerHTML = tasks.map(t => `
    <div class="card">
      <strong>${t.title}</strong><br>
      📅 ${t.date} ⏰ ${t.time}<br><br>
      <button onclick="editTask(${t.id})" class="btn-edit">Edit</button>
      <button onclick="deleteTask(${t.id})" class="btn-delete">Delete</button>
    </div>`).join('');
}

// --- NOTES ---
function addNote() {
  const title = document.getElementById('note-title').value;
  const body = document.getElementById('note-body').value;
  if (!title) return alert('Note title needed');
  
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  const now = new Date().toLocaleString();
  notes.push({ id: Date.now(), title, body, created: now });
  localStorage.setItem('notes', JSON.stringify(notes));
  
  document.getElementById('note-title').value = '';
  document.getElementById('note-body').value = '';
  renderNotes();
  updateDashboard();
}

function deleteNote(id) {
  if(!confirm('Delete this note?')) return;
  let notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes = notes.filter(n => n.id !== id);
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes();
  updateDashboard();
}

function renderNotes() {
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  if(notes.length === 0) {
    document.getElementById('note-list').innerHTML = '<p>No notes yet.</p>';
    return;
  }
  document.getElementById('note-list').innerHTML = notes.map(n => `
    <div class="card">
      <strong>${n.title}</strong><br>
      <small>${n.created}</small>
      <p>${n.body}</p>
      <button onclick="deleteNote(${n.id})" class="btn-delete">Delete</button>
    </div>`).join('');
}

// --- DASHBOARD ---
function updateDashboard() {
  const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  document.getElementById('dash-stats').innerHTML = `
    <div class="card">You have <b>${tasks.length}</b> tasks.</div>
    <div class="card">You have <b>${notes.length}</b> notes.</div>`;
}

// Initial Render on Load
renderTasks(); 
renderNotes(); 
updateDashboard();

// --- SERVICE WORKER REGISTRATION (Offline Mode) ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered! App works offline.'))
      .catch(err => console.error('Service Worker registration failed:', err));
  });
}
</script>
</body>
</html>
