<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4a90e2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22My%20Tasks%20%26%20Notes%22,%22short_name%22:%22TasksNotes%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23ffffff%22,%22theme_color%22:%22%234a90e2%22}">
  <title>My Tasks & Notes</title>
  <style>
    :root { --bg: #f7f9fc; --text: #333; --card: #fff; --primary: #4a90e2; --nav: #222; --nav-active: #4a90e2; --border: #e1e4e8; --muted: #666; }
    [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --primary: #bb86fc; --nav: #000; --nav-active: #bb86fc; --border: #333; --muted: #aaa; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); padding-bottom: 70px; transition: background 0.3s; }
    header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    header h2 { margin: 0; font-size: 1.2rem; }
    .theme-btn { background: rgba(255,255,255,0.2); border: none; padding: 6px 12px; border-radius: 15px; color: white; cursor: pointer; font-size: 14px; }
    .tab-content { display: none; padding: 15px; max-width: 600px; margin: 0 auto; }
    .active { display: block; }
    nav { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--nav); }
    nav button { flex: 1; padding: 15px 5px; background: none; color: white; border: none; cursor: pointer; font-size: 13px; }
    nav button.active { background: var(--nav-active); }
    .card { background: var(--card); padding: 15px; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid var(--border); }
    input, textarea, button { width: 100%; margin: 6px 0; padding: 12px; box-sizing: border-box; font-size: 16px; border-radius: 8px; border: 1px solid var(--border); }
    input, textarea { background: var(--bg); color: var(--text); }
    button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .btn-edit { background: #f0ad4e; }
    .btn-delete { background: #d9534f; }
    .btn-cancel { background: #888; }
    .task-item { display: flex; align-items: flex-start; gap: 10px; }
    .task-info { flex: 1; }
    .task-done { text-decoration: line-through; opacity: 0.5; }
    .task-actions { display: flex; gap: 5px; margin-top: 10px; }
    .task-actions button { padding: 8px; font-size: 14px; }
    .search-bar { margin-bottom: 15px; }
    .backup-btns { display: flex; gap: 10px; margin-top: 20px; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>

<header>
  <h2>My App</h2>
  <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
</header>

<section id="dashboard" class="tab-content active">
  <h3>Dashboard</h3>
  <div id="dash-stats"></div>
  <div class="backup-btns">
    <button onclick="exportData()">⬇️ Backup</button>
    <button onclick="document.getElementById('import-file').click()" class="btn-edit">⬆️ Restore</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(this)">
  </div>
</section>

<section id="tasks" class="tab-content">
  <h3>Tasks</h3>
  <input type="text" id="task-title" placeholder="Task name">
  <input type="date" id="task-date">
  <input type="time" id="task-time">
  <button id="task-submit-btn" onclick="saveTask()">Add Task</button>
  <button id="task-cancel-btn" onclick="cancelEdit()" class="btn-cancel" style="display:none;">Cancel Edit</button>
  <hr>
  <input type="search" id="task-search" class="search-bar" placeholder="🔍 Search tasks..." oninput="renderTasks()">
  <div id="task-list"></div>
</section>

<section id="notes" class="tab-content">
  <h3>Notes</h3>
  <input type="text" id="note-title" placeholder="Note title">
  <textarea id="note-body" placeholder="Write your note..."></textarea>
  <button onclick="addNote()">Save Note</button>
  <hr>
  <input type="search" id="note-search" class="search-bar" placeholder="🔍 Search notes..." oninput="renderNotes()">
  <div id="note-list"></div>
</section>

<nav>
  <button onclick="showTab('dashboard', this)" class="active">Dashboard</button>
  <button onclick="showTab('tasks', this)">Tasks</button>
  <button onclick="showTab('notes', this)">Notes</button>
</nav>

<script>
if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
function showTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  if(btn) btn.classList.add('active');
  updateDashboard();
}
let editingTaskId = null;
function saveTask() {
  const title = document.getElementById('task-title').value;
  const date = document.getElementById('task-date').value;
  const time = document.getElementById('task-time').value;
  if (!title) return alert('Task name needed');
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  if (editingTaskId) { tasks = tasks.map(t => t.id === editingTaskId ? { ...t, title, date, time } : t); } 
  else { tasks.push({ id: Date.now(), title, date, time, done: false }); }
  localStorage.setItem('tasks', JSON.stringify(tasks));
  cancelEdit(); renderTasks(); updateDashboard();
}
function toggleTask(id) {
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
  localStorage.setItem('tasks', JSON.stringify(tasks));
  renderTasks(); updateDashboard();
}
function editTask(id) {
  const task = JSON.parse(localStorage.getItem('tasks') || '[]').find(t => t.id === id);
  if (!task) return;
  document.getElementById('task-title').value = task.title;
  document.getElementById('task-date').value = task.date;
  document.getElementById('task-time').value = task.time;
  editingTaskId = id;
  document.getElementById('task-submit-btn').textContent = 'Update Task';
  document.getElementById('task-cancel-btn').style.display = 'block';
  window.scrollTo(0, 0);
}
function cancelEdit() {
  editingTaskId = null;
  document.getElementById('task-title').value = '';
  document.getElementById('task-date').value = '';
  document.getElementById('task-time').value = '';
  document.getElementById('task-submit-btn').textContent = 'Add Task';
  document.getElementById('task-cancel-btn').style.display = 'none';
}
function deleteTask(id) {
  if(!confirm('Delete this task?')) return;
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]').filter(t => t.id !== id);
  localStorage.setItem('tasks', JSON.stringify(tasks));
  if (editingTaskId === id) cancelEdit();
  renderTasks(); updateDashboard();
}
function renderTasks() {
  const q = document.getElementById('task-search').value.toLowerCase();
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]').filter(t => t.title.toLowerCase().includes(q));
  if(tasks.length === 0) { document.getElementById('task-list').innerHTML = '<p>No tasks found.</p>'; return; }
  document.getElementById('task-list').innerHTML = tasks.map(t => `
    <div class="card">
      <div class="task-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})" style="width:auto; margin-top:5px;">
        <div class="task-info ${t.done ? 'task-done' : ''}">
          <strong>${t.title}</strong><br><small>📅 ${t.date} ⏰ ${t.time}</small>
        </div>
      </div>
      <div class="task-actions">
        <button onclick="editTask(${t.id})" class="btn-edit">Edit</button>
        <button onclick="deleteTask(${t.id})" class="btn-delete">Delete</button>
      </div>
    </div>`).join('');
}
function addNote() {
  const title = document.getElementById('note-title').value;
  const body = document.getElementById('note-body').value;
  if (!title) return alert('Note title needed');
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes.push({ id: Date.now(), title, body, created: new Date().toLocaleString() });
  localStorage.setItem('notes', JSON.stringify(notes));
  document.getElementById('note-title').value = '';
  document.getElementById('note-body').value = '';
  renderNotes(); updateDashboard();
}
function deleteNote(id) {
  if(!confirm('Delete this note?')) return;
  let notes = JSON.parse(localStorage.getItem('notes') || '[]').filter(n => n.id !== id);
  localStorage.setItem('notes', JSON.stringify(notes));
  renderNotes(); updateDashboard();
}
function renderNotes() {
  const q = document.getElementById('note-search').value.toLowerCase();
  let notes = JSON.parse(localStorage.getItem('notes') || '[]').filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q));
  if(notes.length === 0) { document.getElementById('note-list').innerHTML = '<p>No notes found.</p>'; return; }
  document.getElementById('note-list').innerHTML = notes.map(n => `
    <div class="card">
      <strong>${n.title}</strong><br><small>${n.created}</small>
      <p>${n.body}</p>
      <button onclick="deleteNote(${n.id})" class="btn-delete">Delete</button>
    </div>`).join('');
}
function updateDashboard() {
  const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  const notes = JSON.parse(localStorage.getItem('notes') || '[]');
  const pending = tasks.filter(t => !t.done).length;
  document.getElementById('dash-stats').innerHTML = `
    <div class="card">📝 <b>${pending}</b> pending tasks.</div>
    <div class="card">✅ <b>${tasks.length}</b> total tasks.</div>
    <div class="card">📒 <b>${notes.length}</b> notes saved.</div>`;
}
function exportData() {
  const data = { tasks: JSON.parse(localStorage.getItem('tasks')||'[]'), notes: JSON.parse(localStorage.getItem('notes')||'[]') };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'my-app-backup.json'; a.click();
}
function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      localStorage.setItem('tasks', JSON.stringify(data.tasks||[]));
      localStorage.setItem('notes', JSON.stringify(data.notes||[]));
      renderTasks(); renderNotes(); updateDashboard();
      alert('Backup restored successfully!');
    } catch(err) { alert('Invalid file.'); }
  };
  reader.readAsText(file);
}
renderTasks(); renderNotes(); updateDashboard();
</script>
</body>
</html>
