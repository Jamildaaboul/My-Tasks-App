<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2E7D32">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <title>My Tasks, Notes & Events</title>
  <style>
    :root { --bg: #F4F7F5; --text: #2C3E30; --card: #FFFFFF; --primary: #2E7D32; --primary-hover: #1B5E20; --nav: #1E1E1E; --nav-active: #2E7D32; --border: #E0E8E0; --muted: #666; --shadow: 0 4px 12px rgba(0,0,0,0.06); }
    [data-theme="dark"] { --bg: #121612; --text: #E8F0E8; --card: #1E241E; --primary: #66BB6A; --primary-hover: #81C784; --nav: #0A0C0A; --nav-active: #66BB6A; --border: #2A332A; --muted: #AAA; --shadow: 0 4px 12px rgba(0,0,0,0.3); }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); padding-bottom: calc(90px + env(safe-area-inset-bottom)); transition: background 0.3s; }
    header { background: var(--primary); color: white; padding: 20px 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .tab-content { display: none; padding: 20px 15px; max-width: 600px; margin: 0 auto; }
    .active { display: block; }
    nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: var(--nav); padding: 5px 0 calc(5px + env(safe-area-inset-bottom)); z-index: 9999; }
    nav button { flex: 1; padding: 12px 5px; background: none; color: #AAA; border: none; font-size: 13px; font-weight: bold; cursor: pointer; }
    nav button.active { color: white; }
    .card { background: var(--card); padding: 18px; margin-bottom: 14px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    input, textarea, select, button { width: 100%; margin: 8px 0; padding: 14px; font-size: 16px; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box; font-family: inherit; }
    input, textarea, select { background: var(--bg); color: var(--text); }
    button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
    button:hover { background: var(--primary-hover); }
    .btn-edit { background: #F0AD4E; } .btn-delete { background: #D9534F; } .btn-cancel { background: #888; }
    hr { border: 0; border-top: 1px solid var(--border); margin: 25px 0; }
  </style>
</head>
<body>

<header><h2>My App</h2><button onclick="toggleTheme()" style="background:rgba(255,255,255,0.2);border:none;padding:8px 14px;border-radius:20px;color:white;cursor:pointer;">🌓 Theme</button></header>

<section id="dashboard" class="tab-content active"><h3>Dashboard</h3><div id="dash-stats"></div></section>

<section id="tasks" class="tab-content">
  <h3>Tasks</h3>
  <input type="text" id="task-title" placeholder="Task name">
  <input type="date" id="task-date"><input type="time" id="task-time">
  <select id="task-category"><option>General</option><option>Work</option><option>Personal</option><option>Shopping</option><option>Health</option></select>
  <button id="task-submit-btn" onclick="saveTask()">Add Task</button>
  <button id="task-cancel-btn" onclick="cancelEditTask()" class="btn-cancel" style="display:none;">Cancel Edit</button>
  <hr>
  <div id="task-list"></div>
</section>

<section id="events" class="tab-content">
  <h3>Events</h3>
  <input type="text" id="event-title" placeholder="Event name">
  <input type="date" id="event-date"><input type="time" id="event-time">
  <input type="text" id="event-location" placeholder="Location">
  <textarea id="event-details" placeholder="Details"></textarea>
  <button id="event-submit-btn" onclick="saveEvent()">Add Event</button>
  <button id="event-cancel-btn" onclick="cancelEditEvent()" class="btn-cancel" style="display:none;">Cancel Edit</button>
  <hr>
  <div id="event-list"></div>
</section>

<section id="notes" class="tab-content">
  <h3>Notes</h3>
  <input type="text" id="note-title" placeholder="Note title">
  <textarea id="note-body" placeholder="Write your note..."></textarea>
  <button id="note-submit-btn" onclick="saveNote()">Save Note</button>
  <button id="note-cancel-btn" onclick="cancelEditNote()" class="btn-cancel" style="display:none;">Cancel Edit</button>
  <hr>
  <div id="note-list"></div>
</section>

<nav>
  <button onclick="showTab('dashboard', this)" class="active">🏠 Dash</button>
  <button onclick="showTab('tasks', this)">✅ Tasks</button>
  <button onclick="showTab('events', this)">📅 Events</button>
  <button onclick="showTab('notes', this)">📝 Notes</button>
</nav>

<script>
function showTab(id, btn) {
  var tabs = document.getElementsByClassName('tab-content');
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
  var btns = document.getElementsByTagName('nav')[0].getElementsByTagName('button');
  for (var j=0; j<btns.length; j++) btns[j].classList.remove('active');
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  updateDashboard();
}
function val(id) { return document.getElementById(id).value; }
function setVal(id, v) { document.getElementById(id).value = v; }
function toggleTheme() { alert('Theme toggle is visual only in this test; full version keeps your choice!'); }

// TASKS
var editingTaskId = null;
function saveTask() {
  try {
    if (!val('task-title')) { alert('Task name needed'); return; }
    var tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    if (editingTaskId) {
      for (var i=0; i<tasks.length; i++) { if (tasks[i].id === editingTaskId) { tasks[i].title = val('task-title'); tasks[i].date = val('task-date'); tasks[i].time = val('task-time'); tasks[i].category = val('task-category'); } }
    } else { tasks.push({id: Date.now(), title: val('task-title'), date: val('task-date'), time: val('task-time'), category: val('task-category'), done: false}); }
    localStorage.setItem('tasks', JSON.stringify(tasks));
    setVal('task-title',''); setVal('task-date',''); setVal('task-time',''); setVal('task-category','General');
    editingTaskId = null; document.getElementById('task-submit-btn').textContent='Add Task'; document.getElementById('task-cancel-btn').style.display='none';
    renderTasks(); alert('Task Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function editTask(id) {
  var tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  for (var i=0; i<tasks.length; i++) {
    if (tasks[i].id === id) { setVal('task-title', tasks[i].title); setVal('task-date', tasks[i].date); setVal('task-time', tasks[i].time); setVal('task-category', tasks[i].category); editingTaskId = id; document.getElementById('task-submit-btn').textContent='Update Task'; document.getElementById('task-cancel-btn').style.display='block'; window.scrollTo(0,0); }
  }
}
function cancelEditTask() { editingTaskId=null; setVal('task-title',''); setVal('task-date',''); setVal('task-time',''); setVal('task-category','General'); document.getElementById('task-submit-btn').textContent='Add Task'; document.getElementById('task-cancel-btn').style.display='none'; }
function deleteTask(id) {
  if (!confirm('Delete?')) return;
  var tasks = JSON.parse(localStorage.getItem('tasks') || '[]'); var n=[];
  for (var i=0; i<tasks.length; i++) { if(tasks[i].id!==id) n.push(tasks[i]); }
  localStorage.setItem('tasks', JSON.stringify(n));
  if(editingTaskId===id) cancelEditTask();
  renderTasks();
}
function renderTasks() {
  var tasks = JSON.parse(localStorage.getItem('tasks') || '[]'); var h='';
  for (var i=0; i<tasks.length; i++) { h += '<div class="card"><strong>'+tasks[i].title+'</strong><br><small>'+tasks[i].date+' '+tasks[i].time+'</small> '+tasks[i].category+'<br><button class="btn-edit" onclick="editTask('+tasks[i].id+')">Edit</button> <button class="btn-delete" onclick="deleteTask('+tasks[i].id+')">Delete</button></div>'; }
  document.getElementById('task-list').innerHTML = h || '<p>No tasks.</p>';
}

// EVENTS
var editingEventId = null;
function saveEvent() {
  try {
    if (!val('event-title')) { alert('Event name needed'); return; }
    var events = JSON.parse(localStorage.getItem('events') || '[]');
    if (editingEventId) { for (var i=0; i<events.length; i++) { if (events[i].id === editingEventId) { events[i].title = val('event-title'); events[i].date = val('event-date'); events[i].time = val('event-time'); events[i].location = val('event-location'); events[i].details = val('event-details'); } } } 
    else { events.push({id: Date.now(), title: val('event-title'), date: val('event-date'), time: val('event-time'), location: val('event-location'), details: val('event-details')}); }
    localStorage.setItem('events', JSON.stringify(events));
    setVal('event-title',''); setVal('event-date',''); setVal('event-time',''); setVal('event-location',''); setVal('event-details','');
    editingEventId = null; document.getElementById('event-submit-btn').textContent='Add Event'; document.getElementById('event-cancel-btn').style.display='none';
    renderEvents(); alert('Event Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function editEvent(id) {
  var events = JSON.parse(localStorage.getItem('events') || '[]');
  for (var i=0; i<events.length; i++) { if (events[i].id === id) { setVal('event-title', events[i].title); setVal('event-date', events[i].date); setVal('event-time', events[i].time); setVal('event-location', events[i].location); setVal('event-details', events[i].details); editingEventId = id; document.getElementById('event-submit-btn').textContent='Update Event'; document.getElementById('event-cancel-btn').style.display='block'; window.scrollTo(0,0); } }
}
function cancelEditEvent() { editingEventId=null; setVal('event-title',''); setVal('event-date',''); setVal('event-time',''); setVal('event-location',''); setVal('event-details',''); document.getElementById('event-submit-btn').textContent='Add Event'; document.getElementById('event-cancel-btn').style.display='none'; }
function deleteEvent(id) {
  if (!confirm('Delete?')) return;
  var events = JSON.parse(localStorage.getItem('events') || '[]'); var n=[];
  for (var i=0; i<events.length; i++) { if(events[i].id!==id) n.push(events[i]); }
  localStorage.setItem('events', JSON.stringify(n)); if(editingEventId===id) cancelEditEvent(); renderEvents();
}
function renderEvents() {
  var events = JSON.parse(localStorage.getItem('events') || '[]'); var h='';
  for (var i=0; i<events.length; i++) { h += '<div class="card"><strong>'+events[i].title+'</strong><br><small>'+events[i].date+' '+events[i].time+'</small><br>'+events[i].location+'<br><button class="btn-edit" onclick="editEvent('+events[i].id+')">Edit</button> <button class="btn-delete" onclick="deleteEvent('+events[i].id+')">Delete</button></div>'; }
  document.getElementById('event-list').innerHTML = h || '<p>No events.</p>';
}

// NOTES (With Edit & Dates)
var editingNoteId = null;
function saveNote() {
  try {
    if (!val('note-title')) { alert('Note title needed'); return; }
    var notes = JSON.parse(localStorage.getItem('notes') || '[]');
    if (editingNoteId) { for (var i=0; i<notes.length; i++) { if (notes[i].id === editingNoteId) { notes[i].title = val('note-title'); notes[i].body = val('note-body'); notes[i].created = new Date().toLocaleString(); notes[i].timestamp = Date.now(); } } } 
    else { notes.push({id: Date.now(), title: val('note-title'), body: val('note-body'), created: new Date().toLocaleString(), timestamp: Date.now()}); }
    localStorage.setItem('notes', JSON.stringify(notes));
    setVal('note-title',''); setVal('note-body','');
    editingNoteId = null; document.getElementById('note-submit-btn').textContent='Save Note'; document.getElementById('note-cancel-btn').style.display='none';
    renderNotes(); alert('Note Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function editNote(id) {
  var notes = JSON.parse(localStorage.getItem('notes') || '[]');
  for (var i=0; i<notes.length; i++) { if (notes[i].id === id) { setVal('note-title', notes[i].title); setVal('note-body', notes[i].body); editingNoteId = id; document.getElementById('note-submit-btn').textContent='Update Note'; document.getElementById('note-cancel-btn').style.display='block'; showTab('notes', null); window.scrollTo(0,0); } }
}
function cancelEditNote() { editingNoteId=null; setVal('note-title',''); setVal('note-body',''); document.getElementById('note-submit-btn').textContent='Save Note'; document.getElementById('note-cancel-btn').style.display='none'; }
function deleteNote(id) {
  if (!confirm('Delete?')) return;
  var notes = JSON.parse(localStorage.getItem('notes') || '[]'); var n=[];
  for (var i=0; i<notes.length; i++) { if(notes[i].id!==id) n.push(notes[i]); }
  localStorage.setItem('notes', JSON.stringify(n)); if(editingNoteId===id) cancelEditNote(); renderNotes();
}
function renderNotes() {
  var notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes.sort(function(a,b){ return (b.timestamp||b.id) - (a.timestamp||a.id); });
  var h='';
  for (var i=0; i<notes.length; i++) { h += '<div class="card"><strong>'+notes[i].title+'</strong><br><small>'+notes[i].created+'</small><p>'+notes[i].body+'</p><button class="btn-edit" onclick="editNote('+notes[i].id+')">Edit</button> <button class="btn-delete" onclick="deleteNote('+notes[i].id+')">Delete</button></div>'; }
  document.getElementById('note-list').innerHTML = h || '<p>No notes.</p>';
}

// DASHBOARD
function updateDashboard() {
  var t = JSON.parse(localStorage.getItem('tasks')||'[]').length;
  var e = JSON.parse(localStorage.getItem('events')||'[]').length;
  var n = JSON.parse(localStorage.getItem('notes')||'[]').length;
  document.getElementById('dash-stats').innerHTML = '<div class="card">Tasks: '+t+'</div><div class="card">Events: '+e+'</div><div class="card">Notes: '+n+'</div>';
}

renderTasks(); renderEvents(); renderNotes(); updateDashboard();
</script>
</body>
</html>
