<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>My App</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background: #F4F7F5; padding-bottom: calc(90px + env(safe-area-inset-bottom)); }
    header { background: #2E7D32; color: white; padding: 20px 15px; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .tab-content { display: none; padding: 20px 15px; max-width: 600px; margin: 0 auto; }
    .active { display: block; }
    nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #1E1E1E; padding: 5px 0 calc(5px + env(safe-area-inset-bottom)); z-index: 9999; }
    nav button { flex: 1; padding: 12px 5px; background: none; color: #AAA; border: none; font-size: 13px; font-weight: bold; }
    nav button.active { color: white; }
    .card { background: white; padding: 18px; margin-bottom: 14px; border-radius: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, textarea, select, button { width: 100%; margin: 8px 0; padding: 14px; font-size: 16px; border-radius: 12px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #2E7D32; color: white; border: none; font-weight: bold; cursor: pointer; }
    .btn-edit { background: #F0AD4E; } .btn-delete { background: #D9534F; }
    .btn-cancel { background: #888; }
  </style>
</head>
<body>

<header><h2>My App</h2><button onclick="toggleTheme()">🌓</button></header>

<section id="dashboard" class="tab-content active"><h3>Dashboard</h3><div id="dash-stats"></div></section>

<section id="tasks" class="tab-content">
  <h3>Tasks</h3>
  <input type="text" id="task-title" placeholder="Task name">
  <input type="date" id="task-date"><input type="time" id="task-time">
  <select id="task-category"><option>General</option><option>Work</option><option>Personal</option></select>
  <button onclick="saveTask()">Add Task</button>
  <div id="task-list"></div>
</section>

<section id="events" class="tab-content">
  <h3>Events</h3>
  <input type="text" id="event-title" placeholder="Event name">
  <input type="date" id="event-date"><input type="time" id="event-time">
  <input type="text" id="event-location" placeholder="Location">
  <button onclick="saveEvent()">Add Event</button>
  <div id="event-list"></div>
</section>

<section id="notes" class="tab-content">
  <h3>Notes</h3>
  <input type="text" id="note-title" placeholder="Note title">
  <textarea id="note-body" placeholder="Write note..."></textarea>
  <button onclick="saveNote()">Save Note</button>
  <div id="note-list"></div>
</section>

<nav>
  <button onclick="showTab('dashboard', this)" class="active">Dash</button>
  <button onclick="showTab('tasks', this)">Tasks</button>
  <button onclick="showTab('events', this)">Events</button>
  <button onclick="showTab('notes', this)">Notes</button>
</nav>

<script>
function showTab(id, btn) {
  var tabs = document.getElementsByClassName('tab-content');
  for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
  var btns = document.getElementsByTagName('nav')[0].getElementsByTagName('button');
  for (var j=0; j<btns.length; j++) btns[j].classList.remove('active');
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  updateDashboard();
}
function val(id) { return document.getElementById(id).value; }
function setVal(id, v) { document.getElementById(id).value = v; }

function saveTask() {
  try {
    if (!val('task-title')) { alert('Task name needed'); return; }
    var tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    tasks.push({id: Date.now(), title: val('task-title'), date: val('task-date'), time: val('task-time'), category: val('task-category'), done: false});
    localStorage.setItem('tasks', JSON.stringify(tasks));
    setVal('task-title',''); setVal('task-date',''); setVal('task-time',''); setVal('task-category','General');
    renderTasks(); alert('Task Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function renderTasks() {
  var tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  var h = '';
  for (var i=0; i<tasks.length; i++) {
    h += '<div class="card"><strong>'+tasks[i].title+'</strong><br><small>'+tasks[i].date+' '+tasks[i].time+'</small><br>'+tasks[i].category+'</div>';
  }
  document.getElementById('task-list').innerHTML = h || '<p>No tasks.</p>';
}

function saveEvent() {
  try {
    if (!val('event-title')) { alert('Event name needed'); return; }
    var events = JSON.parse(localStorage.getItem('events') || '[]');
    events.push({id: Date.now(), title: val('event-title'), date: val('event-date'), time: val('event-time'), location: val('event-location')});
    localStorage.setItem('events', JSON.stringify(events));
    setVal('event-title',''); setVal('event-date',''); setVal('event-time',''); setVal('event-location','');
    renderEvents(); alert('Event Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function renderEvents() {
  var events = JSON.parse(localStorage.getItem('events') || '[]');
  var h = '';
  for (var i=0; i<events.length; i++) {
    h += '<div class="card"><strong>'+events[i].title+'</strong><br><small>'+events[i].date+' '+events[i].time+'</small><br>'+events[i].location+'</div>';
  }
  document.getElementById('event-list').innerHTML = h || '<p>No events.</p>';
}

function saveNote() {
  try {
    if (!val('note-title')) { alert('Note title needed'); return; }
    var notes = JSON.parse(localStorage.getItem('notes') || '[]');
    notes.push({id: Date.now(), title: val('note-title'), body: val('note-body'), created: new Date().toLocaleString()});
    localStorage.setItem('notes', JSON.stringify(notes));
    setVal('note-title',''); setVal('note-body','');
    renderNotes(); alert('Note Saved!');
  } catch(e) { alert('Error: '+e.message); }
}
function renderNotes() {
  var notes = JSON.parse(localStorage.getItem('notes') || '[]');
  notes.sort(function(a,b){ return b.id - a.id; });
  var h = '';
  for (var i=0; i<notes.length; i++) {
    h += '<div class="card"><strong>'+notes[i].title+'</strong><br><small>'+notes[i].created+'</small><p>'+notes[i].body+'</p></div>';
  }
  document.getElementById('note-list').innerHTML = h || '<p>No notes.</p>';
}

function updateDashboard() {
  var t = JSON.parse(localStorage.getItem('tasks')||'[]').length;
  var e = JSON.parse(localStorage.getItem('events')||'[]').length;
  var n = JSON.parse(localStorage.getItem('notes')||'[]').length;
  document.getElementById('dash-stats').innerHTML = '<div class="card">Tasks: '+t+'</div><div class="card">Events: '+e+'</div><div class="card">Notes: '+n+'</div>';
}

function toggleTheme() { alert('Theme switch coming soon!'); }

renderTasks(); renderEvents(); renderNotes(); updateDashboard();
</script>
</body>
</html>
